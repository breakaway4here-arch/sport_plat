<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="训练教练">
  <meta name="theme-color" content="#2563EB">
  <title>训练教练</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <header class="app-header">
    <div class="app-header-copy">
      <div class="app-header-kicker">Performance Coach</div>
      <div class="app-header-title">训练教练</div>
    </div>
  </header>
  <div id="pull-refresh" class="pull-refresh" aria-live="polite" aria-hidden="true">
    <span class="pull-refresh-icon">↓</span>
    <span class="pull-refresh-text">下拉刷新</span>
  </div>

  <main>
    <section id="tab-today" class="tab-content active"></section>
    <section id="tab-plan" class="tab-content"></section>
    <section id="tab-history" class="tab-content"></section>
    <section id="tab-stats" class="tab-content"></section>
  </main>

  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="today">训练</button>
    <button class="tab-btn" data-tab="plan">计划</button>
    <button class="tab-btn" data-tab="history">打卡</button>
    <button class="tab-btn" data-tab="stats">统计</button>
  </nav>

  <script src="js/exercises.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js?v=20260529-2').then((registration) => {
        registration.update();
      }).catch(() => {});
    }
  </script>
</body>
</html>
