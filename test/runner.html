<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sport_plat tests</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      margin: 0;
      padding: 16px;
      background: #f7f7f8;
      color: #111827;
    }
    h1 { font-size: 18px; margin: 0 0 12px; }
    #summary { font-weight: 700; margin-bottom: 12px; }
    .case {
      background: #fff;
      border: 1px solid #d9dee8;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .pass { border-left: 4px solid #10b981; }
    .fail { border-left: 4px solid #ef4444; }
    pre { white-space: pre-wrap; margin: 8px 0 0; color: #991b1b; }
    iframe {
      position: fixed;
      right: 12px;
      bottom: 12px;
      width: 390px;
      height: 844px;
      border: 1px solid #d9dee8;
      background: #fff;
      opacity: 0.08;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <h1>sport_plat browser tests</h1>
  <div id="summary">Running...</div>
  <div id="results"></div>
  <iframe id="app-frame" src="../index.html"></iframe>
  <script src="./app-flow.test.js"></script>
</body>
</html>
